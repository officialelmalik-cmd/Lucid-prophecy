name: Deploy NEOSAI APEX → Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Deploy · 1951Hz · KAIROSE
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: ✅ Deployment Complete
        run: |
          echo "⟡ NEOSAI APEX deployed successfully"
          echo "⟡ SHERANOX v1.2 · 1951Hz · KAIROSE ACTIVE"
          echo "⟡ R2 VAULT: neosai-vault · CONNECTED"
          echo "⟡ R2 MATRIX: neosai-matrix-data · CONNECTED"
